version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Containerfile.dev
    ports:
      - "3000:3000"
    environment:
      OGA_LOCAL_RUNTIME_ENABLED: "true"
      OGA_SERVICE_MODE: "local-test"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
      neon-proxy:
        condition: service_healthy
      mailhog:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - oga-network
    volumes:
      - .:/app
      - /app/node_modules

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: oga_local
      POSTGRES_USER: oga_user
      POSTGRES_PASSWORD: oga_test_password_local
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oga_user -d oga_local"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - oga-postgres-data:/var/lib/postgresql/data
      - ./tests/db/bootstrap:/docker-entrypoint-initdb.d
    networks:
      - oga-network

  neon-proxy:
    build:
      context: ./services/neon-compat-proxy
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: oga_user
      POSTGRES_PASSWORD: oga_test_password_local
      POSTGRES_DB: oga_local
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    ports:
      - "55433:55433"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks:
      - oga-network

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks:
      - oga-network

networks:
  oga-network:
    driver: bridge

volumes:
  oga-postgres-data:
