version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Containerfile.dev
    ports:
      - "3000:3000"
    environment:
      OGA_LOCAL_RUNTIME_ENABLED: "true"
      OGA_SERVICE_MODE: "local-test"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    depends_on:
      database:
        condition: service_healthy
      database-proxy:
        condition: service_healthy
      email-mock:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - oga-network
    volumes:
      - .:/app
      - /app/node_modules

  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: oga_local
      POSTGRES_USER: oga_user
      POSTGRES_PASSWORD: oga_test_password_local
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oga_user -d oga_local"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - oga-postgres-data:/var/lib/postgresql/data
      - ./tests/db/bootstrap:/docker-entrypoint-initdb.d
    networks:
      - oga-network

  database-proxy:
    build:
      context: ./services/database-proxy
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: oga_user
      POSTGRES_PASSWORD: oga_test_password_local
      POSTGRES_DB: oga_local
      POSTGRES_HOST: database
      POSTGRES_PORT: "5432"
    ports:
      - "55433:55433"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks:
      - oga-network

  email-mock:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks:
      - oga-network

  email-proxy:
    build:
      context: ./services/email-proxy
      dockerfile: Dockerfile
    environment:
      PORT: 55435
      MAILHOG_SMTP_HOST: email-mock
    ports:
      - "55435:55435"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:55435/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks:
      - oga-network

  api-mock:
    image: stoplight/prism:4
    command: mock -h 0.0.0.0 /app/mocks/postcodes.io.yaml
    volumes:
      - ./mocks/contracts:/app/mocks
    ports:
      - "4010:4010"
    networks:
      - oga-network

  ai-mock:
    build:
      context: ./services/ai-mock
      dockerfile: Dockerfile
    environment:
      PORT: 55434
    ports:
      - "55434:55434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:55434/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks:
      - oga-network

networks:
  oga-network:
    driver: bridge

volumes:
  oga-postgres-data:
