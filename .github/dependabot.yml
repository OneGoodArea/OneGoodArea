version: 2

updates:
  # Main Next.js app
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # NextAuth v5 is still in beta; major bumps need manual review
      - dependency-name: "next-auth"
        update-types: ["version-update:semver-major"]

  # MCP server package (separate workspace)
  - package-ecosystem: "npm"
    directory: "/mcp"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "mcp"
    commit-message:
      prefix: "chore(deps,mcp)"

  # Neon compatibility proxy service
  - package-ecosystem: "npm"
    directory: "/services/neon-compat-proxy"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "infrastructure"
    commit-message:
      prefix: "chore(deps,infra)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps,ci)"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "infrastructure"
    commit-message:
      prefix: "chore(deps,docker)"

  - package-ecosystem: "docker"
    directory: "/services/neon-compat-proxy"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "infrastructure"
