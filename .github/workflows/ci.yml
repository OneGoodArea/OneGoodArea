name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR branch. Always run main pushes to completion.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    # TODO(GH-issue-lint-cleanup): flip back to blocking once the 13 pre-existing
    # lint errors in design-v2/client.tsx (setState-in-effect, <a>-vs-Link,
    # unescaped entities) are cleaned up in a follow-up PR.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Build-time defaults so the production bundle compiles without real secrets.
          # Runtime clients in src/lib/* are lazy-initialised and only read env on first call.
          NEXT_TELEMETRY_DISABLED: "1"
          SKIP_ENV_VALIDATION: "true"

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    # Informational only — does not block merges. Flag high+critical CVEs for review.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm audit (high+critical only)
        run: npm audit --audit-level=high
