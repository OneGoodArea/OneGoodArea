name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR branch. Always run main pushes to completion.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      STRIPE_SECRET_KEY: sk_test_ci_mock
      STRIPE_API_BASE_URL: http://localhost:12111
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install --no-audit --no-fund
      - name: Start Stripe mock
        run: |
          docker build -t stripe-mock services/stripe-mock
          docker run -d --name stripe-mock -p 12111:12111 stripe-mock
          until curl -sf http://localhost:12111/__test/health; do sleep 1; done
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npm run build
        env:
          # Build-time defaults so the production bundle compiles without real secrets.
          # Runtime clients in src/lib/* are lazy-initialised and only read env on first call.
          NEXT_TELEMETRY_DISABLED: "1"
          SKIP_ENV_VALIDATION: "true"

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    # Informational only — does not block merges. Flag high+critical CVEs for review.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install --no-audit --no-fund
      - name: npm audit (high+critical only, production deps)
        run: npm audit --audit-level=high --omit=dev
